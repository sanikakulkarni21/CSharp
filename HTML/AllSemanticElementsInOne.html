

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic HTML Example</title>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>My Tech Blog</h1>

    <!-- NAVIGATION -->
    <nav>
      <a href="#home">Home</a> |
      <a href="#articles">Articles</a> |
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- SECTION -->
    <section>
      <h2>Latest Article</h2>

      <!-- ARTICLE -->
      <article>
        <h3>What is HTML?</h3>
        <p>
          HTML stands for HyperText Markup Language.  
          It is used to structure web pages.
        </p>

        <!-- BUTTON -->
        <button>Read More</button>
      </article>

    </section>

    <!-- FORM -->
    <section id="contact">
      <h2>Contact Us</h2>

      <form>
        <label for="email">Email:</label><br>
        <input type="email" id="email" required><br><br>

        <button type="submit">Submit</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 My Tech Blog</p>
  </footer>

</body>
</html>
