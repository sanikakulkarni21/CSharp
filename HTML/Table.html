





<!-- <thead>, <tbody>, <tfoot> ...example-- >

<!DOCTYPE html>
<html>
<head>
  <title>Sales Report</title>
</head>
<body>

  <!-- TABLE MUST BE INSIDE BODY -->
  <table border="1">
    <caption>Monthly Sales Report</caption>

    <thead>
      <tr>
        <th>Month</th>
        <th>Sales</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>January</td>
        <td>₹50,000</td>
      </tr>
      <tr>
        <td>February</td>
        <td>₹65,000</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <th>Total</th>
        <th>₹1,15,000</th>
      </tr>
    </tfoot>
  </table>



  <table border="1">
  <tr>
    <th>Day</th>
    <th>Subject</th>
  </tr>

  <tr>
    <td rowspan="2">Monday</td>
    <td>HTML</td>
  </tr>
  <tr>
    <td>CSS</td>
  </tr>
</table>



<!--colspan example-->

<table border="1">
    <tr>
        <th>Subjects</th>
        <th>Marks</th>
    </tr>

    <tr>
        <td>HTML</td>
        <td>89</td>
    </tr>

    <tr>
        <td>css</td>
        <td>98</td>
    </tr>

    <tr>
        <td colspan="2">total=187</td>
    </tr>

</body>
</html>
